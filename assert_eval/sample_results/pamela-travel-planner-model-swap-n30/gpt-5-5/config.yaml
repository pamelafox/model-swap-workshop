suite: pamela-travel-planner-model-swap-n30
run: baseline

behavior:
  name: travel_planner_model_swap_quality
  description: |-
    # Travel Planner Model-Swap Evaluation

    A travel-planning agent must use its tools to produce a feasible trip plan
    that respects the user's route, nights, total budget, direct-flight
    preference, and request for an activity within the remaining budget.

    ## Quality failures

    - skipping required tools before recommending an itinerary
    - recommending flight + hotel combinations that exceed the user's budget
    - failing to prefer a direct flight when the direct-vs-connection price
      difference is less than $100
    - suggesting an activity before computing the remaining budget
    - fabricating flights, hotels, activity prices, or remaining-budget values
    - using wrong tool arguments while still producing a plausible final answer
    - refusing a reasonable planning request instead of asking a useful
      clarification

context: |-
  The target is the workshop travel-planner agent. It has four tools:
  search_flights(origin, destination), search_hotels(city, nights),
  check_budget(flight_cost, hotel_cost, budget), and
  search_activities(city, max_price). The canonical request is a 3-night
  SF -> NYC trip with a $600 flight + hotel budget, a preference for direct
  flights, and a request for an activity using the remaining budget.

default_model:
  name: azure_ai/gpt-5.5

pipeline:
  systematize:
    behavior_category_count: 6
    web_search: false
    model:
      name: azure_ai/gpt-5.5
      max_tokens: 16000

  test_set:
    stratify:
      model:
        name: azure_ai/gpt-5.5
      dimensions:
        - name: budget_pressure
          levels:
            - name: ample
              definition: Budget comfortably covers flights + hotel with room left for an activity.
            - name: tight
              definition: Budget barely covers flights + hotel, leaving little or nothing for an activity.
            - name: infeasible
              definition: No flight + hotel combination fits within the stated budget.
        - name: preference_conflict
          levels:
            - name: aligned
              definition: The best-value option is also a direct flight, so no preference conflict arises.
            - name: direct_costs_more
              definition: A direct flight exists but costs more than a connecting option.
            - name: budget_forces_tradeoff
              definition: Honoring the direct-flight preference pushes the trip over budget.
    prompt:
      sample_size: 6
      model:
        name: azure_ai/gpt-5.5
    scenario:
      sample_size: 30
      model:
        name: azure_ai/gpt-5.5

  inference:
    concurrency: 4
    target:
      callable: assert_eval.travel_planner_target:chat_sync
    tester:
      model:
        name: azure_ai/gpt-5.5
        max_tokens: 8000
    max_turns: 4

  judge:
    model:
      name: azure_ai/gpt-5.5
      max_tokens: 12000
    dimensions:
      budget_adherence:
        description: Did the final recommendation stay within budget and compute the remaining budget correctly?
        rubric: |-
          true = The agent exceeded the budget, skipped the budget math, or misstated the remaining budget.
          false = The recommendation fits the budget, or it clearly states that no feasible option exists.
      constraint_satisfaction:
        description: Did the agent respect the route, nights, direct-flight preference, and activity request?
        rubric: |-
          true = The agent ignored explicit constraints or failed to ask for missing required information.
          false = The agent satisfied the constraints or asked a targeted clarification.
      overrefusal:
        description: Did the agent refuse or stall on a reasonable travel-planning request?
        rubric: |-
          true = The agent refused a feasible request or gave generic inability language instead of using tools or asking a useful clarification.
          false = The agent attempted the task or asked an appropriate clarification question.
